<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <filter id="noise">
      <feTurbulence type="turbulence" baseFrequency="0.8" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <rect fill="#1a1a1a" width="400" height="250"/>
  <rect x="15" y="15" width="370" height="195" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <rect x="25" y="25" width="350" height="175" fill="#151515" filter="url(#noise)"/>
  <rect x="150" y="25" width="100" height="18" fill="#0a0a0a"/>
  <text x="200" y="38" text-anchor="middle" fill="#ff6600" font-size="9" font-family="monospace">REC</text>
  <circle cx="270" cy="34" r="4" fill="#ff0000">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="30" y="215" fill="#666" font-size="9" font-family="monospace">2023-09-18 07:20:15</text>
  <text x="320" y="215" fill="#666" font-size="9" font-family="monospace">CAM-03</text>
  <g filter="url(#blur)">
    <ellipse cx="200" cy="120" rx="28" ry="40" fill="#4a6fa5"/>
    <rect x="180" y="75" width="40" height="6" fill="#1a3a5c"/>
    <ellipse cx="200" cy="65" rx="25" ry="28" fill="#e8d5c4"/>
    <rect x="170" y="160" width="60" height="90" fill="#3d5a80"/>
    <rect x="170" y="160" width="60" height="30" fill="#2d4a70"/>
  </g>
  <text x="200" y="235" text-anchor="middle" fill="#ff6600" font-size="10" font-family="monospace">文化宫早市西侧入口</text>
</svg>